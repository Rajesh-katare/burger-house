{% extends "base.html" %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div class="modal-content glass-form" style="width: 100%; max-width: 400px;">
        <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">Login</button>
            <button class="auth-tab" data-tab="signup">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="auth-form active">
            <h2>Welcome Back</h2>
            <div class="input-group">
                <label for="login-email">Email Address</label>
                <input type="email" id="login-email" required placeholder="john@example.com">
            </div>
            <div class="input-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" required placeholder="••••••••">
            </div>
            <button type="submit" class="submit-btn">
                Login
                <span class="btn-glow"></span>
            </button>
        </form>

        <!-- Sign Up Form -->
        <form id="signup-form" class="auth-form" style="display: none;">
            <h2>Create Account</h2>
            <div class="input-group">
                <label for="signup-name">Full Name</label>
                <input type="text" id="signup-name" required placeholder="John Doe">
            </div>
            <div class="input-group">
                <label for="signup-email">Email Address</label>
                <input type="email" id="signup-email" required placeholder="john@example.com">
            </div>
            <div class="input-group">
                <label for="signup-password">Password</label>
                <input type="password" id="signup-password" required placeholder="••••••••">
            </div>
            <button type="submit" class="submit-btn" style="background: var(--surface-color); border: 1px solid var(--accent-color);">
                Sign Up
                <span class="btn-glow"></span>
            </button>
        </form>
    </div>
</div>
{% endblock %}
