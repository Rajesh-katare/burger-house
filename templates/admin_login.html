{% extends "base.html" %}

{% block content %}
<div class="form-section" style="max-width: 450px; margin: 60px auto;">
    <form class="glass-form" method="POST" action="/admin/login">
        <div style="text-align: center; margin-bottom: 30px;">
            <h2 style="color: var(--accent-color); font-size: 2rem;">Admin Portal</h2>
            <p style="color: var(--text-secondary); font-size: 0.95rem;">Authorized Personnel Only</p>
        </div>
        
        {% if error %}
        <div class="form-message error-msg" style="margin-bottom: 20px; background: rgba(248, 113, 113, 0.1); padding: 10px; border-radius: 8px; border: 1px solid rgba(248, 113, 113, 0.3);">
            {{ error }}
        </div>
        {% endif %}

        <div class="input-group">
            <label for="username">Admin ID</label>
            <input type="text" id="username" name="username" required placeholder="Enter admin ID">
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Enter password">
        </div>

        <button type="submit" class="submit-btn" style="margin-top: 10px;">
            Access Dashboard
        </button>
        
        <div style="text-align: center; margin-top: 20px;">
            <a href="/" style="color: var(--text-secondary); text-decoration: none; font-size: 0.9rem;">&larr; Back to App</a>
        </div>
    </form>
</div>
{% endblock %}
